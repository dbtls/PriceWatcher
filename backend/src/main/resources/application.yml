spring:
  application:
    name: pricewatch
  profiles:
    active: dev

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:pricewatch-secret-key-pricewatch-secret-key}
  access-token-validity: 900000
  refresh-token-validity: 1209600000

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  auth:
    refresh-cookie-name: ${REFRESH_COOKIE_NAME:refreshToken}
    refresh-cookie-secure: ${REFRESH_COOKIE_SECURE:false}

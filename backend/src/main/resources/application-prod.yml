spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  batch:
    jdbc:
      initialize-schema: never
    job:
      enabled: false

logging:
  level:
    root: info

app:
  email:
    dispatch-enabled: ${EMAIL_DISPATCH_ENABLED:false}
    dispatch-delay-ms: ${EMAIL_DISPATCH_DELAY_MS:10000}
    max-attempt: ${EMAIL_MAX_ATTEMPT:3}
  search:
    elasticsearch:
      enabled: ${PRODUCT_SEARCH_ES_ENABLED:true}

spring:
  autoconfigure:
    exclude:
      - org.redisson.spring.starter.RedissonAutoConfigurationV2
  datasource:
    url: jdbc:h2:mem:pricewatch;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379
    elasticsearch:
      repositories:
        enabled: false

  elasticsearch:
    uris: http://localhost:9200

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

jwt:
  secret: pricewatch-secret-key-pricewatch-secret-key
  access-token-validity: 900000

app:
  search:
    elasticsearch:
      enabled: false
